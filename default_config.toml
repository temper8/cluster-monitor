[slurm]
host = "login.node"
username = "monitor"
key_path = "~/.ssh/monitor_key"
sinfo_args = "-N -l"
output_file = "data/state.txt"
hash_file = "data/state.hash.txt"

[ntfy]
topic = "my_slurm_cluster"
server = "https://ntfy.sh"                 # опционально
proxy = "http://proxy.example.com:8080"    # опционально
title = "SLURM Cluster Alert"
message = "Свободных узлов: {free_nodes}"
priority = "high"
tags = "warning,computer"

[telegram]
bot_token = "123456:ABC-DEF"
chat_id = "-1001234567890"